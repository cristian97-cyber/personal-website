<article [class]="cardClass">
  @if (title || subtitle || icon) {
    <header class="mb-6">
      <div class="flex flex-col sm:flex-row sm:items-center gap-3">
        @if (icon) {
          <div [class]="iconClass">
            <img [class]="iconImgClass" [src]="'svg/' + icon + '.svg'" [alt]="icon" />
          </div>
        }

        <div>
          @if (title) {
            <h2 [class]="titleClass">
              {{ title }}
            </h2>
          }

          @if (subtitle) {
            <p class="mt-1 text-sm text-muted-foreground">
              {{ subtitle }}
            </p>
          }
        </div>
      </div>
    </header>
  }

  <div class="text-base leading-7 text-card-foreground">
    <ng-content />
  </div>
</article>
