<header class="sticky top-0 z-50 bg-card text-card-foreground">
  <nav
    class="flex items-center justify-between px-6 py-4 sm:px-10 lg:px-16"
    aria-label="Main navigation"
  >
    <a routerLink="/home" class="logo text-2xl font-black leading-none" aria-label="Go to home">
      CE
    </a>

    <div class="hidden items-center gap-6 md:flex lg:gap-8">
      @for (item of navbarItems; track item.label) {
        <a
          [routerLink]="item.link"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-sm py-1 px-3 rounded nav-link"
        >
          {{ item.label }}
        </a>
      }
      <div class="h-8 w-px bg-primary-foreground/25" aria-hidden="true"></div>
      <ng-container [ngTemplateOutlet]="themeToggle"></ng-container>
    </div>

    <div class="flex items-center gap-2 md:hidden">
      <ng-container [ngTemplateOutlet]="themeToggle"></ng-container>
      <app-button
        [type]="ButtonTypeEnum.Button"
        [variant]="ButtonVariantEnum.Ghost"
        [size]="ButtonSizeEnum.Icon"
        (click$)="toggleMobileMenu()"
        [ariaLabel]="isMobileMenuOpen ? 'Close navigation menu' : 'Open navigation menu'"
      >
        @if (isMobileMenuOpen) {
          <svg lucideX class="size-6" aria-hidden="true"></svg>
        } @else {
          <svg lucideMenu class="size-6" aria-hidden="true"></svg>
        }
      </app-button>
    </div>
  </nav>

  @if (isMobileMenuOpen) {
    <div class="border-t border-border px-6 pb-4 pt-2 sm:px-10 md:hidden">
      <div class="flex w-full flex-col gap-1">
        @for (item of navbarItems; track item.label) {
          <a
            [routerLink]="item.link"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link w-full rounded px-3 py-3 text-sm"
            (click)="closeMobileMenu()"
          >
            {{ item.label }}
          </a>
        }
      </div>
    </div>
  }
</header>

<ng-template #themeToggle>
  <app-button
    [type]="ButtonTypeEnum.Button"
    [variant]="ButtonVariantEnum.Ghost"
    [size]="ButtonSizeEnum.Icon"
    extraClass="theme-toggle"
    (click$)="toggleTheme()"
    [ariaLabel]="themeService.isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
  >
    @if (themeService.isDark()) {
      <svg lucideSun class="size-6 text-yellow-400" aria-hidden="true"></svg>
    } @else {
      <svg lucideMoon class="size-6" aria-hidden="true"></svg>
    }
  </app-button>
</ng-template>
