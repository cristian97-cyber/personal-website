<footer class="bg-card px-6 py-10 text-card-foreground sm:px-10 lg:px-16">
  <div class="mx-auto w-full max-w-6xl">
    <div class="grid items-center gap-8 text-center md:grid-cols-[1fr_auto_1fr] md:text-left">
      <div class="flex justify-center md:justify-start">
        <app-logo></app-logo>
      </div>

      <nav
        class="flex flex-wrap items-center justify-center gap-x-6 gap-y-3"
        aria-label="Footer navigation"
      >
        @for (item of navbarItems; track item.label) {
          <a [routerLink]="item.link" class="footer-link text-sm font-medium">
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="flex justify-center gap-3 md:justify-end" aria-label="Useful links">
        @for (link of links; track link.name) {
          <app-link-icon [link]="link"></app-link-icon>
        }
      </div>
    </div>

    <div class="mt-10 border-t border-border pt-6">
      <p class="text-center text-sm md:text-left">© {{ year }} Cristian Esposito</p>
    </div>
  </div>
</footer>
